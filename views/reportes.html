<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Reportes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet"
        href="../css/estilos.css">

    <script src="../components/Navbar.js"
        defer></script>

    <script type="module"
        src="../Controllers/reportesController.js"></script>

</head>

<body>

    <nav-bar></nav-bar>

    <main class="container py-4">

        <h1 class="mb-4">
            Módulo de Reportes
        </h1>

        <!-- TABS -->

        <ul class="nav nav-tabs mb-4">

            <li class="nav-item">

                <button
                    class="nav-link active"
                    data-bs-toggle="tab"
                    data-bs-target="#prestamos">

                    Reporte de Préstamos

                </button>

            </li>

            <li class="nav-item">

                <button
                    class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#devoluciones">

                    Reporte de Devoluciones

                </button>

            </li>

            <li class="nav-item">

                <button
                    class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#estadisticas">

                    Estadísticas

                </button>

            </li>

        </ul>

        <div class="tab-content">

            <!-- REPORTE PRESTAMOS -->

            <section
                class="tab-pane fade show active"
                id="prestamos">

                <div class="card">

                    <div class="card-header">

                        Reporte de Préstamos

                    </div>

                    <div class="card-body">

                        <div id="msgPrestamos"></div>

                        <div class="row g-3">

                            <div class="col-md-3">

                                <label class="form-label">
                                    Fecha Inicio
                                </label>

                                <input
                                    type="date"
                                    class="form-control"
                                    id="fechaInicioPrestamo">

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Fecha Fin
                                </label>

                                <input
                                    type="date"
                                    class="form-control"
                                    id="fechaFinPrestamo">

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Estado
                                </label>

                                <select
                                    class="form-select"
                                    id="estadoPrestamo">

                                    <option>
                                        Todos
                                    </option>

                                    <option>
                                        Activo
                                    </option>

                                    <option>
                                        Vencido
                                    </option>

                                    <option>
                                        Devuelto
                                    </option>

                                </select>

                            </div>

                            <div class="col-md-3">

                                <label class="form-label">
                                    Usuario
                                </label>

                                <input
                                    type="text"
                                    class="form-control"
                                    placeholder="Buscar usuario">

                            </div>

                        </div>

                        <div class="mt-4">

                            <button
                                class="btn btn-primary">

                                Generar Reporte

                            </button>

                            <button
                                class="btn btn-success">

                                Exportar Excel

                            </button>

                            <button
                                class="btn btn-danger">

                                Exportar PDF

                            </button>

                        </div>

                        <div class="table-responsive mt-4">

                            <table
                                class="table table-bordered table-hover">

                                <thead class="table-light">

                                    <tr>

                                        <th>ID</th>

                                        <th>Usuario</th>

                                        <th>Libro</th>

                                        <th>Fecha Préstamo</th>

                                        <th>Fecha Límite</th>

                                        <th>Estado</th>

                                    </tr>

                                </thead>

                                <tbody id="tablaPrestamos">

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </section>

            <!-- REPORTE DEVOLUCIONES -->

            <section
                class="tab-pane fade"
                id="devoluciones">

                <div class="card">

                    <div class="card-header">

                        Reporte de Devoluciones

                    </div>

                    <div class="card-body">

                        <div class="row g-3">

                            <div class="col-md-4">

                                <label class="form-label">
                                    Fecha Inicio
                                </label>

                                <input
                                    type="date"
                                    class="form-control">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    Fecha Fin
                                </label>

                                <input
                                    type="date"
                                    class="form-control">

                            </div>

                            <div class="col-md-4">

                                <label class="form-label">
                                    Tipo
                                </label>

                                <select
                                    class="form-select">

                                    <option>
                                        Todas
                                    </option>

                                    <option>
                                        Con Multa
                                    </option>

                                    <option>
                                        Sin Multa
                                    </option>

                                </select>

                            </div>

                        </div>

                        <div class="mt-4">

                            <button
                                class="btn btn-primary">

                                Generar Reporte

                            </button>

                            <button
                                class="btn btn-success">

                                Exportar Excel

                            </button>

                            <button
                                class="btn btn-danger">

                                Exportar PDF

                            </button>

                        </div>

                        <div class="table-responsive mt-4">

                            <table
                                class="table table-bordered table-hover">

                                <thead class="table-light">

                                    <tr>

                                        <th>ID</th>

                                        <th>Usuario</th>

                                        <th>Libro</th>

                                        <th>Fecha Devolución</th>

                                        <th>Multa</th>

                                    </tr>

                                </thead>

                                <tbody id="tablaDevoluciones">

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </section>

            <!-- ESTADISTICAS -->

            <section
                class="tab-pane fade"
                id="estadisticas">

                <div class="row">

                    <div class="col-md-3">

                        <div class="card text-center">

                            <div class="card-body">

                                <h5>
                                    Total Préstamos
                                </h5>

                                <h2 id="totalPrestamos">
                                    0
                                </h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-center">

                            <div class="card-body">

                                <h5>
                                    Total Devoluciones
                                </h5>

                                <h2 id="totalDevoluciones">
                                    0
                                </h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-center">

                            <div class="card-body">

                                <h5>
                                    Multas Recaudadas
                                </h5>

                                <h2 id="totalMultas">
                                    ₡0
                                </h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-center">

                            <div class="card-body">

                                <h5>
                                    Usuarios Activos
                                </h5>

                                <h2 id="usuariosActivos">
                                    0
                                </h2>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="card mt-4">

                    <div class="card-header">

                        Libros Más Prestados

                    </div>

                    <div class="card-body">

                        <div
                            class="table-responsive">

                            <table
                                class="table table-bordered">

                                <thead>

                                    <tr>

                                        <th>
                                            Libro
                                        </th>

                                        <th>
                                            Cantidad
                                        </th>

                                    </tr>

                                </thead>

                                <tbody
                                    id="tablaLibrosMasPrestados">

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </section>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
