<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="../css/login.css">

</head>

<body>

    <main class="login-page">

        <section class="login-card">

            <div class="logo-container">
                <img src="../img/logo.png" alt="Logo del sistema" class="login-logo">
            </div>

            <div class="text-center mb-4">
                <h1 class="login-title">Bienvenido</h1>
                <p class="login-subtitle">Ingrese sus datos para acceder al sistema</p>
            </div>

            <!-- Aquí se mostrarán las alertas con jQuery -->
            <div id="alertaLogin"></div>

            <form id="formLogin">

                <div class="mb-3">
                    <label for="correo" class="form-label">Correo electrónico</label>
                    <input type="email" class="form-control input-login" id="correo" name="correo"
                        placeholder="ejemplo@gmail.com">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control input-login" id="password" name="password"
                        placeholder="Ingrese su contraseña">
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" id="btnLogin" class="btn btn-login">
                        Iniciar Sesión
                    </button>

                    <a href="recuperar.html" class="btn btn-outline-login">
                        Recuperar Contraseña
                    </a>
                </div>

                <div class="text-center mt-4">
                    <p class="register-text">
                        ¿No tienes una cuenta?
                        <a href="registro.html">Regístrate aquí</a>
                    </p>
                </div>

            </form>

        </section>

    </main>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- JS del login -->
    <script src="../Controllers/loginController.js"></script>

</body>

</html>
