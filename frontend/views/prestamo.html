<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préstamos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/prestamos.css">
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="../components/Navbar.js" defer></script>
</head>

<body>

    <nav-bar></nav-bar>

    <main class="container py-4">

        <h1 class="mb-4">Módulo de Préstamos</h1>

        <ul class="nav nav-tabs mb-4">

            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#solicitud">
                    Solicitar préstamo
                </button>
            </li>

            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#activos">
                    Préstamos activos
                </button>
            </li>

            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#renovacion">
                    Renovar préstamo
                </button>
            </li>

        </ul>

        <div class="tab-content">

            <section class="tab-pane fade show active" id="solicitud">

                <div class="card">

                    <div class="card-header">
                        Solicitar préstamo de libro
                    </div>

                    <div class="card-body">

                        <div id="msgPrestamo"></div>

                        <form id="formPrestamo">

                            <input type="hidden" id="idPrestamo">

                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label class="form-label">Usuario</label>
                                    <select class="form-select" id="usuarioPrestamo">
                                        <option value="">Seleccionar usuario</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Libro</label>
                                    <select class="form-select" id="libroPrestamo">
                                        <option value="">Seleccionar libro</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Estado del libro</label>
                                    <select class="form-select" id="estadoLibro">
                                        <option value="Reservado">Reservado</option>
                                        <option value="Prestado">Prestado</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Estado del préstamo</label>
                                    <select class="form-select" id="estadoPrestamo">
                                        <option value="Prestado">Prestado</option>
                                                                                <option value="Perdido">Perdido</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Fecha préstamo</label>
                                    <input type="date" class="form-control" id="fechaPrestamo">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Fecha devolución</label>
                                    <input type="date" class="form-control" id="fechaDevolucion">
                                </div>

                            </div>

                            <button type="submit" class="btn btn-primary mt-4">
                                Solicitar préstamo
                            </button>

                        </form>

                    </div>

                </div>

            </section>

            <section class="tab-pane fade" id="activos">

                <div class="card">

                    <div class="card-header">
                        Lista de préstamos activos
                    </div>

                    <div class="card-body">

                        <div class="row g-3 mb-3">

                            <div class="col-md-4">
                                <label class="form-label">Buscar usuario</label>
                                <input type="text" class="form-control" id="buscarPrestamo">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Estado</label>
                                <select class="form-select" id="filtroPrestamo">
                                    <option value="">Todos</option>
                                    <option value="Prestado">Prestado</option>
                                                                        <option value="Perdido">Perdido</option>
                                </select>
                            </div>

                        </div>

                        <div class="table-responsive">

                            <table class="table table-bordered table-hover">

                                <thead class="table-light">

                                    <tr>
                                        <th>ID</th>
                                        <th>Usuario</th>
                                        <th>Libro</th>
                                        <th>Fecha préstamo</th>
                                        <th>Fecha devolución</th>
                                        <th>Estado libro</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>

                                </thead>

                                <tbody id="tablaPrestamos"></tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </section>

            <div class="modal fade" id="modalEditarPrestamo" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Editar préstamo activo</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                        </div>
                        <div class="modal-body">
                            <div id="msgEdicionPrestamo" class="mb-3"></div>
                            <input type="hidden" id="editarPrestamoId">
                            <div class="mb-3">
                                <label class="form-label" for="editarEstadoLibro">Estado del libro</label>
                                <select class="form-select" id="editarEstadoLibro">
                                    <option value="Reservado">Reservado</option>
                                    <option value="Prestado">Prestado</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" for="editarEstadoPrestamo">Estado del préstamo</label>
                                <select class="form-select" id="editarEstadoPrestamo">
                                    <option value="Prestado">Prestado</option>
                                                                        <option value="Perdido">Perdido</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="button" class="btn btn-primary" id="btnGuardarEdicionPrestamo">Guardar cambios</button>
                        </div>
                    </div>
                </div>
            </div>

            <section class="tab-pane fade" id="renovacion">

                <div class="card">

                    <div class="card-header">
                        Renovar préstamo
                    </div>

                    <div class="card-body">

                        <div id="msgRenovacion"></div>

                        <form id="formRenovacion">

                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label class="form-label">Préstamo activo</label>
                                    <select class="form-select" id="prestamoRenovar"></select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Nueva fecha devolución</label>
                                    <input type="date" class="form-control" id="nuevaFecha">
                                </div>

                            </div>

                            <button type="submit" class="btn btn-success mt-4">
                                Renovar préstamo
                            </button>

                        </form>

                    </div>

                </div>

            </section>

        </div>

    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Controllers/prestamoController.js"></script>

</body>

</html>
