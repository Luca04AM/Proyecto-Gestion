<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer Contraseña</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- CSS propio -->
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <main class="login-page">

        <section class="login-card">

            <div class="logo-container">
                <img src="../img/logo.png" alt="Logo SIGAB Libros" class="login-logo">
            </div>

            <div class="text-center mb-4">
                <h1 class="login-title">Nueva Contraseña</h1>
                <p class="login-subtitle">
                    Ingrese el token generado y defina su nueva contraseña.
                </p>
            </div>

            <div id="alertaReset"></div>

            <form id="formReset">

                <div class="mb-3">
                    <label for="token" class="form-label">Token</label>
                    <input 
                        type="text" 
                        class="form-control input-login" 
                        id="token" 
                        placeholder="Ingrese el token"
                    >
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Nueva Contraseña</label>
                    <input 
                        type="password" 
                        class="form-control input-login" 
                        id="password" 
                        placeholder="Mínimo 6 caracteres"
                    >
                </div>

                <div class="mb-3">
                    <label for="confirmarPassword" class="form-label">Confirmar Contraseña</label>
                    <input 
                        type="password" 
                        class="form-control input-login" 
                        id="confirmarPassword" 
                        placeholder="Repita la nueva contraseña"
                    >
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" id="btnReset" class="btn btn-login">
                        Cambiar Contraseña
                    </button>

                    <a href="login.html" class="btn btn-outline-login">
                        Volver al Login
                    </a>
                </div>

            </form>

        </section>

    </main>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Controlador -->
    <script src="../Controllers/resetController.js"></script>

</body>
</html>
