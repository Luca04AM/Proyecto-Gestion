<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- CSS propio -->
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <main class="login-page">

        <section class="login-card">

            <div class="logo-container">
                <img src="../img/logo.png" alt="Logo SIGAB Libros" class="login-logo">
            </div>

            <div class="text-center mb-4">
                <h1 class="login-title">Crear Cuenta</h1>
                <p class="login-subtitle">Complete los datos para registrar un nuevo usuario</p>
            </div>

            <div id="alertaRegistro"></div>

            <form id="formRegistro">

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input 
                        type="text" 
                        class="form-control input-login" 
                        id="nombre" 
                        placeholder="Ingrese su nombre completo"
                    >
                </div>

                <div class="mb-3">
                    <label for="correo" class="form-label">Correo electrónico</label>
                    <input 
                        type="email" 
                        class="form-control input-login" 
                        id="correo" 
                        placeholder="ejemplo@gmail.com"
                    >
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input 
                        type="password" 
                        class="form-control input-login" 
                        id="password" 
                        placeholder="Mínimo 6 caracteres"
                    >
                </div>

                <div class="mb-3">
                    <label for="confirmarPassword" class="form-label">Confirmar Contraseña</label>
                    <input 
                        type="password" 
                        class="form-control input-login" 
                        id="confirmarPassword" 
                        placeholder="Repita la contraseña"
                    >
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" id="btnRegistrar" class="btn btn-login">
                        Registrar Usuario
                    </button>

                    <a href="login.html" class="btn btn-outline-login">
                        Volver al Login
                    </a>
                </div>

            </form>

        </section>

    </main>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Controlador -->
    <script src="../Controllers/registroController.js"></script>

</body>
</html>
