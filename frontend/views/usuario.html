<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/usuarios.css">
    <link rel="stylesheet" href="../css/estilos.css">

    <script src="../components/Navbar.js" defer></script>
</head>

<body>

    <nav-bar></nav-bar>

    <main class="container py-4">

        <h1 class="mb-4">Módulo de Usuarios</h1>

        <ul class="nav nav-tabs mb-4" id="tabsUsuarios" role="tablist">

            <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#registro" type="button">
                    Registrar usuario
                </button>
            </li>

            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#gestion" type="button">
                    Gestionar usuarios
                </button>
            </li>

            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#password" type="button">
                    Cambiar contraseña
                </button>
            </li>

        </ul>

        <div class="tab-content">

            <!-- REGISTRO -->
            <section class="tab-pane fade show active" id="registro">

                <div class="card">
                    <div class="card-header">
                        Registro de usuario
                    </div>

                    <div class="card-body">

                        <div id="msgRegistro"></div>

                        <form id="formRegistro" novalidate>

                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label for="nombreRegistro" class="form-label">Nombre completo</label>
                                    <input type="text" class="form-control" id="nombreRegistro" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="correoRegistro" class="form-label">Correo electrónico</label>
                                    <input type="email" class="form-control" id="correoRegistro" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="passwordRegistro" class="form-label">Contraseña</label>
                                    <input type="password" class="form-control" id="passwordRegistro" required>
                                    <small class="text-muted">Mínimo 6 caracteres.</small>
                                </div>

                                <div class="col-md-6">
                                    <label for="confirmarRegistro" class="form-label">Confirmar contraseña</label>
                                    <input type="password" class="form-control" id="confirmarRegistro" required>
                                </div>

                            </div>

                            <button type="submit" id="btnRegistrarUsuario" class="btn btn-primary mt-4">
                                Registrar usuario
                            </button>

                        </form>

                    </div>
                </div>

            </section>

            <!-- GESTIÓN -->
            <section class="tab-pane fade" id="gestion">

                <div class="card mb-4">
                    <div class="card-header">
                        Lista de usuarios
                    </div>

                    <div class="card-body">

                        <div id="msgGestion"></div>

                        <div class="row g-3 mb-3">

                            <div class="col-md-6">
                                <label for="buscarUsuario" class="form-label">Buscar por nombre o correo</label>
                                <input type="text" class="form-control" id="buscarUsuario"
                                    placeholder="Ej: maria@correo.com">
                            </div>

                            <div class="col-md-6">
                                <label for="filtroEstado" class="form-label">Filtrar por estado</label>
                                <select class="form-select" id="filtroEstado">
                                    <option value="">Todos</option>
                                    <option value="Activo">Activo</option>
                                    <option value="Inactivo">Inactivo</option>
                                </select>
                            </div>

                        </div>

                        <div class="table-responsive">
                            <table class="table table-bordered table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Correo</th>
                                        <th>Estado</th>
                                        <th>Fecha de registro</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>

                                <tbody id="tablaUsuarios"></tbody>
                            </table>
                        </div>

                        <div id="detalleUsuario" class="mt-3"></div>

                    </div>
                </div>

                <div class="card d-none" id="cardEditarUsuario">
                    <div class="card-header">
                        Editar usuario
                    </div>

                    <div class="card-body">

                        <form id="formEditarUsuario">

                            <input type="hidden" id="editarId">

                            <div class="row g-3">

                                <div class="col-md-4">
                                    <label for="editarNombre" class="form-label">Nombre</label>
                                    <input type="text" class="form-control" id="editarNombre" required>
                                </div>

                                <div class="col-md-4">
                                    <label for="editarCorreo" class="form-label">Correo</label>
                                    <input type="email" class="form-control" id="editarCorreo" required>
                                </div>

                                <div class="col-md-4">
                                    <label for="editarEstado" class="form-label">Estado</label>
                                    <select class="form-select" id="editarEstado">
                                        <option value="Activo">Activo</option>
                                        <option value="Inactivo">Inactivo</option>
                                    </select>
                                </div>

                            </div>

                            <button type="submit" id="btnGuardarEdicion" class="btn btn-success mt-4">
                                Guardar cambios
                            </button>

                            <button type="button" class="btn btn-secondary mt-4" id="btnCancelarEdicion">
                                Cancelar
                            </button>

                        </form>

                    </div>
                </div>

            </section>

            <!-- CAMBIO DE CONTRASEÑA -->
            <section class="tab-pane fade" id="password">

                <div class="card">
                    <div class="card-header">
                        Cambiar contraseña
                    </div>

                    <div class="card-body">

                        <div id="msgPassword"></div>

                        <form id="formPassword">

                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label for="usuarioPassword" class="form-label">Usuario</label>
                                    <select class="form-select" id="usuarioPassword"></select>
                                </div>

                                <div class="col-md-6">
                                    <label for="passwordActual" class="form-label">Contraseña actual</label>
                                    <input type="password" class="form-control" id="passwordActual" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="passwordNueva" class="form-label">Nueva contraseña</label>
                                    <input type="password" class="form-control" id="passwordNueva" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="passwordConfirmar" class="form-label">Confirmar nueva contraseña</label>
                                    <input type="password" class="form-control" id="passwordConfirmar" required>
                                </div>

                            </div>

                            <button type="submit" id="btnCambiarPassword" class="btn btn-primary mt-4">
                                Guardar cambios
                            </button>

                        </form>

                    </div>
                </div>

            </section>

        </div>

    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../Controllers/usuariosController.js"></script>

</body>

</html>
