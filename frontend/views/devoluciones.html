<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devoluciones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="stylesheet" href="../css/catalogo.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script type="module" src="../components/Navbar.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../Controllers/devolucionesController.js"></script>
</head>

<body>

    <nav-bar></nav-bar>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1>Gestión de Devoluciones</h1>
                <p class="text-muted">Consulta y seguimiento de devoluciones registradas en el sistema</p>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h4>Registrar Devolución</h4>
            </div>
            <div class="card-body">
                <form id="formDevolucion">
                    <input type="hidden" id="idPrestamo">
                    <input type="hidden" id="idLibro">

                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label" for="prestamoDevolucion">Préstamo activo</label>
                            <select class="form-select" id="prestamoDevolucion">
                                <option value="">Seleccione un préstamo</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" class="form-control" id="usuarioDevolucion" readonly>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Libro</label>
                            <input type="text" class="form-control" id="libroDevolucion" readonly>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Fecha Préstamo</label>
                            <input type="date" class="form-control" id="fechaPrestamo" readonly>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Fecha Devolucion</label>
                            <input type="date" class="form-control" id="fechaDevolucion" readonly>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Fecha devuelto</label>
                            <input type="date" class="form-control" id="fechaDevuelto">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Estado del Libro</label>
                            <select class="form-select" id="estadoLibro">
                                <option value="Excelente">Excelente</option>
                                <option value="Bueno">Bueno</option>
                                <option value="Dañado">Dañado</option>
                                <option value="Muy dañado">Muy dañado</option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Observaciones</label>
                            <textarea class="form-control" rows="3" id="observaciones"></textarea>
                        </div>
                    </div>

                    <div class="mt-3">
                        <button type="submit" class="btn btn-success">Registrar Devolución</button>
                        <button type="reset" class="btn btn-secondary">Limpiar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h4>Consultar Devoluciones</h4>
            </div>
            <div class="card-body">
                <form id="formConsultaDevoluciones">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="txtUsuario">Usuario</label>
                            <input type="text" class="form-control" id="txtUsuario" placeholder="Nombre del usuario">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="txtLibro">Libro</label>
                            <input type="text" class="form-control" id="txtLibro" placeholder="Título del libro">
                        </div>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">Buscar</button>
                        <button type="button" id="btnLimpiarConsulta" class="btn btn-secondary">Limpiar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h4>Historial de Devoluciones</h4>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Libro</th>
                                <th>Fecha devuelto</th>
                                <th>Observaciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaDevoluciones">
                            <tr>
                                <td colspan="5" class="text-center">Cargando devoluciones...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
