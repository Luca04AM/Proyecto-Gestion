<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Multa | SIGAB Libros</title>

    <link rel="stylesheet" href="../css/estilos.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="../components/Navbar.js" defer></script>
</head>

<body>

    <nav-bar></nav-bar>

    <main class="container">

        <div class="card">
            <h1>Detalle de Multa</h1>
            <p>
                Consulte la información detallada de la multa seleccionada.
            </p>
        </div>

        <br>

        <div class="card">

            <h2>Información de la Multa</h2>

            <div id="mensajeDetalleMulta" style="display:none; margin-bottom:15px;">
                No se encontró la información de la multa seleccionada.
            </div>

            <div class="form-grid">

                <div class="form-group">
                    <label>ID de Multa</label>
                    <input type="text" id="txtIdMulta" readonly>
                </div>

                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="txtUsuarioMulta" readonly>
                </div>

                <div class="form-group">
                    <label>ID Usuario</label>
                    <input type="text" id="txtIdUsuario" readonly>
                </div>

                <div class="form-group">
                    <label>Libro</label>
                    <input type="text" id="txtLibroMulta" readonly>
                </div>

                <div class="form-group">
                    <label>ID Libro</label>
                    <input type="text" id="txtIdLibro" readonly>
                </div>

                <div class="form-group">
                    <label>Motivo</label>
                    <input type="text" id="txtMotivoMulta" readonly>
                </div>

                <div class="form-group">
                    <label>Fecha de Devolución</label>
                    <input type="text" id="txtFechaDevolucion" readonly>
                </div>

                <div class="form-group">
                    <label>Monto Calculado</label>
                    <input type="text" id="txtMontoMulta" readonly>
                </div>

            </div>

            <br>

            <div class="acciones-form">
                <button type="button" id="btnVolver" class="btn btn-secondary">
                    Volver
                </button>

                <button type="button" id="btnVerLibro" class="btn btn-editar">
                    Ver Libro
                </button>
            </div>

        </div>

    </main>

    <footer class="footer">
        <p>SIGAB Libros © 2026</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="../Controllers/detalleMultaController.js"></script>

</body>

</html>
