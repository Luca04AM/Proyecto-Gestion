<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Libro</title>

    <link rel="stylesheet" href="../css/estilos.css">
    <link rel="stylesheet" href="../css/catalogo.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script type="module" src="../components/Navbar.js"></script>
</head>

<body>

    <nav-bar></nav-bar>

    <main class="container">

        <div class="card">

            <div class="encabezado-modulo">
                <div>
                    <h1 id="tituloFormulario">Registrar Libro</h1>
                    <p id="subtituloFormulario">Complete la información para agregar un nuevo libro al catálogo.</p>
                </div>

                <div>
                    <a href="catalogo.html" class="btn btn-secondary">
                        Volver al catálogo
                    </a>
                </div>
            </div>

            <hr>

            <div id="mensajeFormulario" class="mensaje-formulario" style="display:none;"></div>

            <form id="formLibro">

                <input type="hidden" id="idLibro">

                <div class="form-grid">

                    <div>
                        <label for="titulo">Título</label>
                        <input type="text" id="titulo" placeholder="Ingrese el título del libro">
                    </div>

                    <div>
                        <label for="autor">Autor</label>
                        <input type="text" id="autor" placeholder="Ingrese el autor del libro">
                    </div>

                    <div>
                        <label for="genero">Género</label>
                        <input type="text" id="genero" placeholder="Ejemplo: Informática, Novela, Historia">
                    </div>

                    <div>
                        <label for="estado">Estado</label>
                        <select id="estado">
                            <option value="Disponible">Disponible</option>
                            <option value="Prestado">Prestado</option>
                            <option value="Reservado">Reservado</option>
                            <option value="No disponible">No disponible</option>
                        </select>
                    </div>

                    <div>
                        <label for="condicion">Condición</label>
                        <select id="condicion">
                            <option value="Excelente">Excelente</option>
                            <option value="Bueno">Bueno</option>
                            <option value="Dañado">Dañado</option>
                            <option value="Muy dañado">Muy dañado</option>
                        </select>
                    </div>

                    <div class="campo-completo">
    <label for="archivoPortada">Portada del Libro</label>

    <div class="zona-archivo" id="zonaPortada">
            <div id="previewPortada" class="preview-portada">
                <p id="textoPortada">Ninguna portada seleccionada</p>
            </div>
        </div>

        <input 
            type="file" 
            id="archivoPortada" 
            accept="image/*"
            class="input-archivo"
        >

        <input type="hidden" id="portada">
    </div>

                </div>

                <div class="campo-completo">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" rows="5" placeholder="Ingrese una descripción del libro"></textarea>
                </div>

                <div class="acciones-formulario">
                    <button type="submit" class="btn btn-primary" id="btnGuardar">
                        Guardar
                    </button>

                    <button type="button" class="btn btn-secondary" id="btnLimpiarFormulario">
                        Limpiar
                    </button>
                </div>

            </form>

        </div>

    </main>

    <footer class="footer">
        <p>SIGAB Libros © 2026</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../Controllers/formLibroController.js"></script>

</body>

</html>
